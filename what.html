var svg = d3.select("#g")
    .attr("width", window.innerWidth)
    .attr("height", window.innerHeight);

var g = svg.append("g");

svg.call(d3.zoom()
    .scaleExtent([0.05, 10])
    .on("zoom", function() {
        g.attr("transform", d3.event.transform);
    })
);

var NW=150, NH=36;

// draw links first so they appear behind nodes
links.forEach(function(l){
    g.append("line")
        .attr("x1", nm[l.s].x).attr("y1", nm[l.s].y)
        .attr("x2", nm[l.t].x).attr("y2", nm[l.t].y)
        .attr("stroke","#999").attr("stroke-width",1)
        .attr("stroke-dasharray", l.d ? "4 3" : null);
});

// draw nodes
nodes.forEach(function(n){
    var grp = g.append("g")
        .attr("transform", "translate("+n.x+","+n.y+")")
        .style("cursor", n.url ? "pointer" : "default")
        .on("click", function() {
            if(n.url) window.open(n.url, "_blank");
        });

    grp.append("rect")
        .attr("x", -NW/2).attr("y", -NH/2)
        .attr("width", NW).attr("height", NH).attr("rx", 4)
        .attr("fill", n.color).attr("stroke","#999").attr("stroke-width",0.5);

    grp.append("text")
        .attr("text-anchor","middle")
        .attr("dominant-baseline","central")
        .attr("font-size", 11)
        .attr("font-family","Helvetica")
        .attr("fill","#000")
        .text(n.label);
